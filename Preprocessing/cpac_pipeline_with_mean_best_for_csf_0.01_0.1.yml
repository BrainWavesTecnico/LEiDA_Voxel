%YAML 1.1---# CPAC Pipeline Configuration YAML file# Version 1.8.7.dev1## http://fcp-indi.github.io for more info.## Tip: This file can be edited manually with a text editor for quick modifications.pipeline_setup:  # Name for this pipeline configuration - useful for identification.  # This string will be sanitized and used in filepaths  pipeline_name: cpac-adni-ants-mean-best-for-csf  output_directory:    path: /outputs/output    source_outputs_dir: None    pull_source_once: True    write_func_outputs: False    write_debugging_outputs: False    output_tree: "default"    quality_control:      generate_quality_control_images: False      generate_xcpqc_files: False  working_directory:    path: /outputs/working    remove_working_dir: True  log_directory:    run_logging: True    path: /outputs/logs    graphviz:      entire_workflow:        generate: Off        graph2use: []        format: []        simple_form: On  crash_log_directory:    path: /outputs/crash  system_config:    fail_fast: Off    random_seed:    on_grid:      run: Off      resource_manager: SGE      SGE:        parallel_environment: mpi_smp        queue: all.q    maximum_memory_per_participant: 35    raise_insufficient: On    observed_usage:      callback_log:      buffer: 10    max_cores_per_participant: 16    num_ants_threads: 16    num_OMP_threads: 8    num_participants_at_once: 1    FSLDIR: FSLDIR  Amazon-AWS:    aws_output_bucket_credentials:    s3_encryption: False  Debugging:    verbose: Off# PREPROCESSING# -------------surface_analysis:  abcd_prefreesurfer_prep:    run: Off  freesurfer:    run_reconall: Off    ingress_reconall: Off    reconall_args:  post_freesurfer:    run: Off    subcortical_gray_labels: /opt/dcan-tools/pipeline/global/config/FreeSurferSubcorticalLabelTableLut.txt    freesurfer_labels: /opt/dcan-tools/pipeline/global/config/FreeSurferAllLut.txt    surf_atlas_dir: /opt/dcan-tools/pipeline/global/templates/standard_mesh_atlases    gray_ordinates_dir: /opt/dcan-tools/pipeline/global/templates/Greyordinates    gray_ordinates_res: 2    high_res_mesh: 164    low_res_mesh: 32    fmri_res: 2    smooth_fwhm: 2  surface_connectivity:    run: Off    surface_parcellation_template: /cpac_templates/Schaefer2018_200Parcels_17Networks_order.dlabel.niilongitudinal_template_generation:  run: Off  average_method: median  dof: 12  interp: trilinear  cost: corratio  thread_pool: 2  convergence_threshold: -1anatomical_preproc:  run: On  run_t2: Off  non_local_means_filtering:    run: [Off]    noise_model: 'Gaussian'  n4_bias_field_correction:    run: [On]        # ativado para ADNI    shrink_factor: 4  t1t2_bias_field_correction:    run: Off    BiasFieldSmoothingSigma: 5  acpc_alignment:    run: Off    run_before_preproc: True    brain_size: 150    FOV_crop: robustfov    acpc_target: 'whole-head'    align_brain_mask: Off    T1w_ACPC_template: $FSLDIR/data/standard/MNI152_T1_1mm.nii.gz    T1w_brain_ACPC_template: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz    T2w_ACPC_template: None    T2w_brain_ACPC_template: None  brain_extraction:    run: On    using: ['niworkflows-ants']   # usar ANTs (OASIS) para T1    AFNI-3dSkullStrip:      mask_vol: False      shrink_factor: 0.6      var_shrink_fac: True      shrink_factor_bot_lim: 0.4      avoid_vent: True      n_iterations: 250      pushout: True      touchup: True      fill_hole: 10      NN_smooth: 72      smooth_final: 20      avoid_eyes: True      use_edge: True      exp_frac: 0.1      push_to_edge: False      use_skull: Off      perc_int: 0      max_inter_iter: 4      fac: 1      blur_fwhm: 0      monkey: False    FSL-BET:      Robustfov: Off      frac: 0.5      mesh_boolean: Off      outline: Off      padding: Off      radius: 0      reduce_bias: Off      remove_eyes: Off      robust: On      skull: Off      surfaces: Off      threshold: Off      vertical_gradient: 0.0    UNet:      unet_model: s3://fcp-indi/resources/cpac/resources/Site-All-T-epoch_36.model    niworkflows-ants:      template_path: /ants_template/oasis/T_template0.nii.gz      mask_path: /ants_template/oasis/T_template0_BrainCerebellumProbabilityMask.nii.gz      regmask_path: /ants_template/oasis/T_template0_BrainCerebellumRegistrationMask.nii.gz    FreeSurfer-BET:      T1w_brain_template_mask_ccs: /ccs_template/MNI152_T1_1mm_first_brain_mask.nii.gzsegmentation:  run: On  tissue_segmentation:    using: ['FSL-FAST']    FSL-FAST:      thresholding:        use: 'Auto'        Custom:          CSF_threshold_value: 0.95          WM_threshold_value: 0.95          GM_threshold_value: 0.95      use_priors:        run: On        priors_path: $FSLDIR/data/standard/tissuepriors/2mm        WM_path: $priors_path/avg152T1_white_bin.nii.gz        GM_path: $priors_path/avg152T1_gray_bin.nii.gz        CSF_path: $priors_path/avg152T1_csf_bin.nii.gz    Template_Based:      template_for_segmentation: ['T1_Template']      WHITE: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_white_bin.nii.gz      GRAY: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_gray_bin.nii.gz      CSF: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_csf_bin.nii.gz    ANTs_Prior_Based:      template_brain_list:        - /cpac_templates/MacaqueYerkes19_T1w_0.5mm_desc-JLC_T1w_brain.nii.gz        - /cpac_templates/J_Macaque_11mo_atlas_nACQ_194x252x160space_0.5mm_desc-JLC_T1w_brain.nii.gz      template_segmentation_list:        - /cpac_templates/MacaqueYerkes19_T1w_0.5mm_desc-JLC_Segmentation.nii.gz        - /cpac_templates/J_Macaque_11mo_atlas_nACQ_194x252x160space_0.5mm_desc-JLC_Segmentation.nii.gz      CSF_label: [24]      GM_label: [3, 42]      WM_label: [2, 41]    FreeSurfer:      erode: 0      CSF_label: [24]      GM_label: [3, 42]      WM_label: [2, 41]registration_workflows:  anatomical_registration:    run: On    resolution_for_anat: 2mm    T1w_brain_template: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain.nii.gz    T1w_template: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}.nii.gz    T1w_brain_template_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz    reg_with_skull: True    registration:      using: ['ANTS']      ANTs:        use_lesion_mask: False        T1_registration:          - collapse-output-transforms: 0          - dimensionality: 3          - initial-moving-transform:             initializationFeature: 0          - transforms:             - Rigid:                 gradientStep: 0.1                 metric:                   type: MI                   metricWeight: 1                   numberOfBins: 32                   samplingStrategy: Regular                   samplingPercentage: 0.25                 convergence:                   iteration: 1000x500x250x100                   convergenceThreshold: 1e-08                   convergenceWindowSize: 10                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 8x4x2x1                 use-histogram-matching: True             - Affine:                 gradientStep: 0.1                 metric:                   type: MI                   metricWeight: 1                   numberOfBins: 32                   samplingStrategy: Regular                   samplingPercentage: 0.25                 convergence:                   iteration: 1000x500x250x100                   convergenceThreshold: 1e-08                   convergenceWindowSize: 10                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 8x4x2x1                 use-histogram-matching: True             - SyN:                 gradientStep: 0.1                 updateFieldVarianceInVoxelSpace: 3.0                 totalFieldVarianceInVoxelSpace: 0.0                 metric:                   type: CC                   metricWeight: 1                   radius: 4                 convergence:                   iteration: 100x100x70x20                   convergenceThreshold: 1e-09                   convergenceWindowSize: 15                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 6x4x2x1                 use-histogram-matching: True                 winsorize-image-intensities:                   lowerQuantile: 0.01                   upperQuantile: 0.99        interpolation: LanczosWindowedSinc      FSL-FNIRT:        fnirt_config: T1_2_MNI152_2mm        ref_resolution: 2mm        ref_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask_dil.nii.gz        FNIRT_T1w_brain_template: None        FNIRT_T1w_template: None        interpolation: sinc        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat        ref_mask_res-2: $FSLDIR/data/standard/MNI152_T1_2mm_brain_mask_dil.nii.gz        T1w_template_res-2: $FSLDIR/data/standard/MNI152_T1_2mm.nii.gz    overwrite_transform:      run: Off      using: FSL  functional_registration:    coregistration:      run: On      reference: brain      using: FSL      input: brain      interpolation: trilinear      cost: bbr        # BBR ativado (melhor precisão)      dof: 6           # BBR exige 6 DOF (rigid-body)      arguments: None      func_input_prep:        reg_with_skull: Off        input: ['Mean_Functional']        Mean Functional:          n4_correct_func: False        Selected Functional Volume:          func_reg_input_volume: 0      boundary_based_registration:        run: [On]      # Ativar bloco de BBR do C-PAC        bbr_schedule: $FSLDIR/etc/flirtsch/bbr.sch        reference: whole-head        bbr_wm_map: 'probability_map'        bbr_wm_mask_args: '-thr 0.5 -bin'    EPI_registration:      run: Off      using: ['ANTS']      EPI_template: s3://fcp-indi/resources/cpac/resources/epi_hbn.nii.gz      EPI_template_mask: None      ANTs:        parameters:          - collapse-output-transforms: 0          - dimensionality: 3          - initial-moving-transform:             initializationFeature: 0          - transforms:             - Rigid:                 gradientStep: 0.1                 metric:                   type: MI                   metricWeight: 1                   numberOfBins: 32                   samplingStrategy: Regular                   samplingPercentage: 0.25                 convergence:                   iteration: 1000x500x250x100                   convergenceThreshold: 1e-08                   convergenceWindowSize: 10                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 8x4x2x1                 use-histogram-matching: True             - Affine:                 gradientStep: 0.1                 metric:                   type: MI                   metricWeight: 1                   numberOfBins: 32                   samplingStrategy: Regular                   samplingPercentage: 0.25                 convergence:                   iteration: 1000x500x250x100                   convergenceThreshold: 1e-08                   convergenceWindowSize: 10                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 8x4x2x1                 use-histogram-matching: True             - SyN:                 gradientStep: 0.1                 updateFieldVarianceInVoxelSpace: 3.0                 totalFieldVarianceInVoxelSpace: 0.0                 metric:                   type: CC                   metricWeight: 1                   radius: 4                 convergence:                   iteration: 100x100x70x20                   convergenceThreshold: 1e-09                   convergenceWindowSize: 15                 smoothing-sigmas: 3.0x2.0x1.0x0.0                 shrink-factors: 6x4x2x1                 use-histogram-matching: True                 winsorize-image-intensities:                   lowerQuantile: 0.01                   upperQuantile: 0.99        interpolation: LanczosWindowedSinc      FSL-FNIRT:        fnirt_config: T1_2_MNI152_2mm        interpolation: sinc        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat    func_registration_to_template:      run: On      run_EPI: Off      output_resolution:        func_preproc_outputs: 2mm        # 2mm para ADNI        func_derivative_outputs: 2mm      target_template:        using: ['T1_template']        T1_template:          T1w_brain_template_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_brain.nii.gz          T1w_template_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}.nii.gz          T1w_brain_template_mask_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_brain_mask.nii.gz          T1w_template_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz        EPI_template:          EPI_template_funcreg: s3://fcp-indi/resources/cpac/resources/epi_hbn.nii.gz          EPI_template_mask_funcreg: None          EPI_template_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz      ANTs_pipelines:        interpolation: LanczosWindowedSinc      FNIRT_pipelines:        interpolation: sinc        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat      apply_transform:        using: 'default'functional_preproc:  run: On  update_header:    run: On  truncation:    start_tr: 0    stop_tr: None  scaling:    run: Off    scaling_factor: 10  despiking:    run: [Off]  slice_timing_correction:    run: [On]    tpattern: None    tzero: None  motion_estimates_and_correction:    run: On    motion_estimates:      calculate_motion_first: Off      calculate_motion_after: On    motion_correction:      using: ['3dvolreg']      AFNI-3dvolreg:        functional_volreg_twopass: On      motion_correction_reference: ['mean']      motion_correction_reference_volume: 0    motion_estimate_filter:      run: [Off]      filters:        - filter_type: "notch"          filter_order: 4          breathing_rate_min:          breathing_rate_max:          center_frequency:          filter_bandwidth:        - filter_type: "lowpass"          filter_order: 4          breathing_rate_min:          lowpass_cutoff:  distortion_correction:    run: [Off]        # fieldmaps desativados para ADNI    using: ['PhaseDiff', 'Blip']    PhaseDiff:      fmap_skullstrip_option: 'BET'      fmap_skullstrip_BET_frac: 0.5      fmap_skullstrip_AFNI_threshold: 0.6    Blip-FSL-TOPUP:      warpres: 10      subsamp: 1      fwhm: 8      miter: 5      lambda: 1      ssqlambda: 1      regmod: bending_energy      estmov: 1      minmet: 0      splineorder: 3      numprec: double      interp: spline      scale: 0      regrid: 1  func_masking:    run: On    using: ['Anatomical_Refined']    FSL-BET:      functional_mean_boolean: Off      functional_mean_thr:        run: Off        threshold_value: 98      functional_mean_bias_correction: Off      frac: 0.3      mesh_boolean: Off      outline: Off      padding: Off      radius: 0      reduce_bias: Off      remove_eyes: Off      robust: Off      skull: Off      surfaces: Off      threshold: Off      vertical_gradient: 0.0    FSL_AFNI:      bold_ref:      brain_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz      brain_probseg: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz    Anatomical_Refined:      anatomical_mask_dilation: True    apply_func_mask_in_native_space: On  generate_func_mean:    run: On  normalize_func:    run: On  coreg_prep:    run: Onnuisance_corrections:  1-ICA-AROMA:    run: [Off]    denoising_type: nonaggr  2-nuisance_regression:    run: [On]    space: native    create_regressors: On    Regressors:      - Name: 'adni_mean_wm_only'        Motion:          include_delayed: true          include_squared: true          include_delayed_squared: true        WhiteMatter:          summary: Mean          extraction_resolution: 4          erode_mask: Off        PolyOrt:          degree: 2        Bandpass:          bottom_frequency: 0.01          top_frequency: 0.10          method: default    lateral_ventricles_mask: $FSLDIR/data/atlases/HarvardOxford/HarvardOxford-lateral-ventricles-thr25-2mm.nii.gz    bandpass_filtering_order: 'After'    regressor_masks:      erode_anatomical_brain_mask:        run: Off        brain_mask_erosion_prop:        brain_mask_erosion_mm:        brain_erosion_mm:      erode_csf:        run: Off        csf_erosion_prop:        csf_mask_erosion_mm:        csf_erosion_mm:      erode_wm:        run: Off        wm_erosion_prop:        wm_mask_erosion_mm:        wm_erosion_mm:      erode_gm:        run: Off        gm_erosion_prop:        gm_mask_erosion_mm:        gm_erosion_mm:post_processing:  spatial_smoothing:    run: On    output: ['smoothed', 'nonsmoothed']    smoothing_method: ['FSL']    fwhm: [5]         # smoothing 5mm FWHM  z-scoring:    run: Off    output: ['raw']timeseries_extraction:  run: Off  tse_roi_paths:    /cpac_templates/CC400.nii.gz: Avg  realignment: 'ROI_to_func'  connectivity_matrix:    using: []    measure:      - Pearsonseed_based_correlation_analysis:  run: Off  sca_roi_paths:    /cpac_templates/CC400.nii.gz: Avg  norm_timeseries_for_DR: Trueamplitude_low_frequency_fluctuation:  run: Off  target_space: ['Native']  highpass_cutoff: [0.01]  lowpass_cutoff: [0.1]regional_homogeneity:  run: Off  target_space: ['Native']  cluster_size: 27voxel_mirrored_homotopic_connectivity:  run: Off  symmetric_registration:    T1w_brain_template_symmetric: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_symmetric.nii.gz    T1w_brain_template_symmetric_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_brain_symmetric.nii.gz    T1w_brain_template_symmetric_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain_symmetric.nii.gz    T1w_template_symmetric: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_symmetric.nii.gz    T1w_template_symmetric_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_symmetric.nii.gz    T1w_template_symmetric_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_symmetric.nii.gz    dilated_symmetric_brain_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask_symmetric_dil.nii.gz    dilated_symmetric_brain_mask_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain_mask_symmetric_dil.nii.gznetwork_centrality:  run: Off  memory_allocation: 1.0  template_specification_file: /cpac_templates/Mask_ABIDE_85Percent_GM.nii.gz  degree_centrality:    weight_options: ['Binarized', 'Weighted']    correlation_threshold_option: 'Sparsity threshold'    correlation_threshold: 0.001  eigenvector_centrality:    weight_options: ['Weighted']    correlation_threshold_option: 'Sparsity threshold'    correlation_threshold: 0.001  local_functional_connectivity_density:    weight_options: ['Binarized', 'Weighted']    correlation_threshold_option: 'Correlation threshold'    correlation_threshold: 0.6PyPEER:  run: Off  eye_scan_names: []  data_scan_names: []  eye_mask_path: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_eye_mask.nii.gz  stimulus_path: None  minimal_nuisance_correction:    peer_gsr: True    peer_scrub: False    scrub_thresh: 0.2